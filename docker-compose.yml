# AD Management — Docker Compose 编排
# 使用：docker compose up -d

services:
  ad-management:
    build: .
    image: ad-management:latest
    container_name: ad-management
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # SQLite 数据持久化
      - ./data:/var/lib/ad-management
      # 日志持久化
      - ./logs:/app/logs
    environment:
      # ── 基础配置 ──
      - HTTP_ADDR=:8080
      - FRONTEND_DIR=frontend
      - DB_PATH=/var/lib/ad-management/ad-management.db
      - LOG_DIR=/app/logs

      # ── 管理员配置（必改）──
      - BOOTSTRAP_ADMIN_USERNAME=admin
      - BOOTSTRAP_ADMIN_PASSWORD=change-this-password

      # ── 会话时效 ──
      - ADMIN_SESSION_DURATION=12h
      - SELF_SERVICE_SESSION_DURATION=8h

      # ── 安全：删除保护账号 ──
      - AD_DELETE_PROTECTED_ACCOUNTS=administrator,krbtgt

      # ── 飞书 OAuth（可选，启用自助端登录需要）──
      # - FEISHU_APP_ID=cli_xxxxx
      # - FEISHU_APP_SECRET=xxxxx
      # - FEISHU_REDIRECT_URI=https://ad.example.com/api/auth/feishu/callback
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 资源限制（按需调整）
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
